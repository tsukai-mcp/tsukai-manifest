name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-lib:
    name: Publish tsukai-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo publish -p tsukai-manifest
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-cli:
    name: Publish tsukai-manifest-cli
    runs-on: ubuntu-latest
    # The CLI depends on tsukai-manifest by version, so the lib must be live on
    # the crates.io index before this publish can resolve. `needs:` orders the
    # job after the lib publish; the retry loop below waits for the new version
    # to become available on the index (indexing is not instantaneous).
    needs: publish-lib
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Publish (retry until lib is indexed)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if cargo publish -p tsukai-manifest-cli; then
              exit 0
            fi
            echo "publish failed (attempt ${attempt}); the lib may not be indexed yet — waiting 30s"
            sleep 30
          done
          echo "tsukai-manifest-cli publish failed after retries"
          exit 1
